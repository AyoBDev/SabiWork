version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sabiwork
      POSTGRES_PASSWORD: sabiwork_dev
      POSTGRES_DB: sabiwork
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sabiwork"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run seed && npm run start"
    environment:
      - DATABASE_URL=postgresql://sabiwork:sabiwork_dev@postgres:5432/sabiwork
      - REDIS_URL=redis://redis:6379

  pwa:
    build: ./pwa
    ports:
      - "5173:5173"
    depends_on:
      - backend

  dashboard:
    build: ./dashboard
    ports:
      - "3001:3001"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3000
      - NEXT_PUBLIC_WS_URL=ws://backend:3000/dashboard/feed

  whatsapp-bot:
    build: ./whatsapp-bot
    ports:
      - "3002:3002"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:3000
      - SERVICE_KEY=sabiwork-bot-secret
    volumes:
      - ./whatsapp-bot/auth_state:/app/auth_state

volumes:
  pgdata:
